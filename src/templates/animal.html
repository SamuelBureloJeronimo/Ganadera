<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Animales</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Registro de Animales</h1>
        <form id="registroForm" class="form-container" novalidate>
            <div class="mb-3">
                <label for="id" class="form-label">ID</label>
                <input type="text" id="id" name="id" class="form-control" required>
                <div class="invalid-feedback">El ID es obligatorio.</div>
            </div>
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" id="nombre" name="nombre" class="form-control" required>
                <div class="invalid-feedback">El nombre es obligatorio.</div>
            </div>
            <div class="mb-3">
                <label for="especie" class="form-label">Especie</label>
                <input type="text" id="especie" name="especie" class="form-control" required>
                <div class="invalid-feedback">La especie es obligatoria.</div>
            </div>
            <div class="mb-3">
                <label for="raza" class="form-label">Raza</label>
                <input type="text" id="raza" name="raza" class="form-control">
            </div>
            <div class="mb-3">
                <label for="sexo" class="form-label">Sexo</label>
                <select id="sexo" name="sexo" class="form-select" required>
                    <option value="">Seleccione</option>
                    <option value="macho">Macho</option>
                    <option value="hembra">Hembra</option>
                </select>
                <div class="invalid-feedback">Seleccione el sexo.</div>
            </div>
            <div class="mb-3">
                <label for="finca" class="form-label">Finca</label>
                <input type="text" id="finca" name="finca" class="form-control">
            </div>
            <div class="mb-3">
                <label for="fecha" class="form-label">Fecha de Nacimiento</label>
                <input type="date" id="fecha" name="fecha" class="form-control" required>
                <div class="invalid-feedback">Seleccione una fecha válida.</div>
            </div>
            <div class="mb-3">
                <label for="estado" class="form-label">Estado</label>
                <select id="estado" name="estado" class="form-select" required>
                    <option value="">Seleccione</option>
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                </select>
                <div class="invalid-feedback">Seleccione un estado.</div>
            </div>
            <div class="mb-3">
                <label class="form-label">Tipo de Animal</label>
                <div class="form-check">
                    <input type="radio" id="interno" name="tipo" value="interno" class="form-check-input" required>
                    <label for="interno" class="form-check-label">Interno</label>
                </div>
                <div class="form-check">
                    <input type="radio" id="externo" name="tipo" value="externo" class="form-check-input" required>
                    <label for="externo" class="form-check-label">Externo</label>
                </div>
                <div class="invalid-feedback">Seleccione si es interno o externo.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Registrar</button>
        </form>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('registroForm').addEventListener('submit', function(event) {
            event.preventDefault();
            let form = event.target;
            if (!form.checkValidity()) {
                event.stopPropagation();
            } else {
                alert('Formulario válido. Enviar datos al backend.');
            }
            form.classList.add('was-validated');
        });
    </script>
</body>
</html>
