<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Razas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Registro de Razas</h1>
        <form id="registroRazas" class="form-container" novalidate enctype="multipart/form-data">
            <div class="mb-3">
                <label for="idRaza" class="form-label">ID de Raza</label>
                <input type="text" id="idRaza" name="idRaza" class="form-control" required>
                <div class="invalid-feedback">Por favor, ingrese un ID válido.</div>
            </div>
            <div class="mb-3">
                <label for="nombreRaza" class="form-label">Nombre de la Raza</label>
                <input type="text" id="nombreRaza" name="nombreRaza" class="form-control" required>
                <div class="invalid-feedback">Por favor, ingrese un nombre válido.</div>
            </div>
            <div class="mb-3">
                <label for="especie" class="form-label">Especie</label>
                <select id="especie" name="especie" class="form-select" required>
                    <option value="">Seleccione una especie</option>
                    <option value="Bovino">Bovino</option>
                    <option value="Ovino">Ovino</option>
                    <option value="Porcino">Porcino</option>
                    <option value="Equino">Equino</option>
                    <option value="Caprino">Caprino</option>
                </select>
                <div class="invalid-feedback">Seleccione una especie.</div>
            </div>
            <div class="mb-3">
                <label for="origen" class="form-label">Origen</label>
                <input type="text" id="origen" name="origen" class="form-control">
            </div>
            <div class="mb-3">
                <label for="descripcion" class="form-label">Descripción</label>
                <textarea id="descripcion" name="descripcion" class="form-control" maxlength="500" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label for="fortalezas" class="form-label">Fortalezas</label>
                <textarea id="fortalezas" name="fortalezas" class="form-control" maxlength="500" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label for="debilidades" class="form-label">Debilidades</label>
                <textarea id="debilidades" name="debilidades" class="form-control" maxlength="500" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label for="peligros" class="form-label">Peligros</label>
                <textarea id="peligros" name="peligros" class="form-control" maxlength="500" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label for="especialidad" class="form-label">Especialidad (Uso principal)</label>
                <select id="especialidad" name="especialidad" class="form-select" required>
                    <option value="">Seleccione un uso principal</option>
                    <option value="Producción de leche">Producción de leche</option>
                    <option value="Producción de carne">Producción de carne</option>
                    <option value="Trabajo">Trabajo</option>
                    <option value="Reproducción">Reproducción</option>
                    <option value="Otro">Otro</option>
                </select>
                <div class="invalid-feedback">Seleccione una especialidad.</div>
            </div>
            <div class="mb-3">
                <label for="imagenRaza" class="form-label">Subir Imagen</label>
                <input type="file" id="imagenRaza" name="imagenRaza" class="form-control" accept="image/*">
                <div class="form-text">Formatos permitidos: JPG, PNG. Tamaño máximo: 5MB.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Registrar</button>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Validar formulario al enviarlo
        document.getElementById('registroRazas').addEventListener('submit', function(event) {
            event.preventDefault();
            if (this.checkValidity()) {
                alert('Formulario enviado con éxito.');
            } else {
                this.classList.add('was-validated');
            }
        });
    </script>
</body>
</html>
