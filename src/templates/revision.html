<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Revisiones</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Revisiones</h1>
        <form id="revisionForm" class="form-container" novalidate>
            <div class="mb-3">
                <label for="rfcEmpleado" class="form-label">RFC del Empleado</label>
                <input type="text" id="rfcEmpleado" name="rfcEmpleado" class="form-control" pattern="^[A-Z]{4}\\d{6}[A-Z0-9]{3}$" required>
                <div class="invalid-feedback">Ingrese un RFC válido.</div>
            </div>
            <div class="mb-3">
                <label for="numeroArete" class="form-label">Número de Arete</label>
                <input type="number" id="numeroArete" name="numeroArete" class="form-control" required>
                <div class="invalid-feedback">Ingrese un número de arete válido.</div>
            </div>
            <div class="mb-3">
                <label for="peso" class="form-label">Peso (kg)</label>
                <input type="number" id="peso" name="peso" class="form-control" step="0.01" required>
                <div class="invalid-feedback">Ingrese un peso válido.</div>
            </div>
            <div class="mb-3">
                <label for="temperatura" class="form-label">Temperatura (°C)</label>
                <input type="number" id="temperatura" name="temperatura" class="form-control" step="0.1" required>
                <div class="invalid-feedback">Ingrese una temperatura válida.</div>
            </div>
            <div class="mb-3">
                <label for="fecha" class="form-label">Fecha</label>
                <input type="date" id="fecha" name="fecha" class="form-control" required>
                <div class="invalid-feedback">Seleccione una fecha válida.</div>
            </div>
            <div class="mb-3">
                <label for="observaciones" class="form-label">Observaciones</label>
                <textarea id="observaciones" name="observaciones" class="form-control" maxlength="250" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Guardar</button>
        </form>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Validar formulario al enviarlo
        document.getElementById('revisionForm').addEventListener('submit', function(event) {
            event.preventDefault();
            if (this.checkValidity()) {
                alert('Formulario enviado con éxito.');
            } else {
                this.classList.add('was-validated');
            }
        });
    </script>
</body>
</html>
