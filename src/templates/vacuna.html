<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Animales</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Vacunacion de Animales</h1>
        <form id="registroForm" class="form-container" novalidate>
            <div class="mb-3">
                <label for="arete" class="form-label">Número de Arete</label>
                <input type="number" id="arete" name="arete" class="form-control" required>
                <div class="invalid-feedback">Ingrese un número de arete válido.</div>
            </div>
            <button type="button" id="buscarAnimal" class="btn btn-primary w-100">Buscar</button>
        </form>

        <!-- Tabla para mostrar los datos del animal -->
        <div class="mt-4" id="animalInfo" style="display: none;">
            <h2 class="text-center">Información del Animal</h2>
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Especie</th>
                        <th>Raza</th>
                        <th>Sexo</th>
                        <th>Fecha de Nacimiento</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td id="nombre"></td>
                        <td id="especie"></td>
                        <td id="raza"></td>
                        <td id="sexo"></td>
                        <td id="fecha"></td>
                        <td id="estado"></td>
                    </tr>
                </tbody>
            </table>
            <button type="button" id="gestionarSalud" class="btn btn-success w-100">Gestionar Salud</button>
        </div>

        <!-- Formulario de Gestión de Salud -->
        <div id="formSalud" class="mt-4 hidden">
            <h3 class="text-center">Gestión de Salud</h3>
            <form id="saludForm" class="form-container">
                <div class="mb-3">
                    <label for="id" class="form-label">ID</label>
                    <input type="number" id="id" name="id" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="fecha" class="form-label">Fecha</label>
                    <input type="date" id="fecha" name="fecha" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="rfcEmpleado" class="form-label">RFC del Empleado</label>
                    <input type="text" id="rfcEmpleado" name="rfcEmpleado" class="form-control" pattern="^[A-Z]{4}\\d{6}[A-Z0-9]{3}$" required>
                </div>
                <div class="mb-3">
                    <label for="medicamentos" class="form-label">Medicamentos</label>
                    <input type="text" id="medicamentos" name="medicamentos" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="proximaDosis" class="form-label">Próxima Dosis</label>
                    <input type="date" id="proximaDosis" name="proximaDosis" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="peso" class="form-label">Peso (kg)</label>
                    <input type="number" id="peso" name="peso" class="form-control" step="0.01" required>
                    <div class="invalid-feedback">Por favor, ingrese un peso válido.</div>
                </div>
                <div class="mb-3">
                    <label for="observaciones" class="form-label">Observaciones</label>
                    <textarea id="observaciones" name="observaciones" class="form-control" maxlength="250"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Guardar</button>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Mostrar tabla de información del animal al buscar
        document.getElementById('buscarAnimal').addEventListener('click', function() {
            document.getElementById('animalInfo').style.display = 'block';
        });

        // Mostrar formulario de gestión de salud al presionar "Gestionar Salud"
        document.getElementById('gestionarSalud').addEventListener('click', function() {
            const formSalud = document.getElementById('formSalud');
            formSalud.classList.toggle('hidden');
        });
    </script>
</body>
</html>
